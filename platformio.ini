; OpenOBD — CAN-Bus-Datenlogger für VW Golf 8.5
; Zielhardware: LilyGO T-CAN485 (ESP32-WROOM-32 + SN65HVD231 + microSD)
; Siehe README.md für Flash-Anleitung und "PROJECT BRIEF.md" für den Gesamtplan.
;
; Konfiguration liegt in include/config.h (Compile-Zeit — keine config.json auf SD).
; Zwei Flash-Ziele:
;   Normal:  python3 -m platformio run -e t-can485      --target upload --target monitor
;   Dev:     python3 -m platformio run -e t-can485-dev  --target upload --target monitor

; Gemeinsame Einstellungen fuer alle Ziele
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
; SD/WiFi/WebServer/LittleFS/SPI/ESPmDNS + TWAI sind Teil des arduino-esp32-Frameworks.
; Extern nur PubSubClient (Dev-MQTT). (DS3231 spaeter: "adafruit/RTClib" ergaenzen.)
lib_deps =
	knolleary/PubSubClient@^2.8
build_flags =
	-D CORE_DEBUG_LEVEL=1

; --- Normal-Modus: Cockpit-Dashboard + schlankes Logging ---
[env:t-can485]

; --- Dev-Modus: kein Dashboard, volles Roh-Log + Dev-Streaming ---
[env:t-can485-dev]
build_flags =
	${env.build_flags}
	-D CFG_DEV_MODE=true
